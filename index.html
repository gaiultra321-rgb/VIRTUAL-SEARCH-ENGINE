<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Virtual Browser</title>
    <style>
        body, html { font-family: Arial, sans-serif; margin: 0; padding: 0; height: 100%; background: #202124; color: #fff; overflow: hidden; }
        .nav-bar { background: #303134; padding: 10px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #3c4043; }
        .logo { font-size: 20px; font-weight: bold; text-transform: uppercase; color: #4285F4; margin-right: 10px; }
        input { flex-grow: 1; padding: 10px 15px; font-size: 14px; background: #202124; border: 1px solid #5f6368; border-radius: 20px; color: #fff; }
        input:focus { outline: none; border-color: #8ab4f8; }
        button { background: #107c41; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0b592e; }
        .container { width: 100%; height: calc(100% - 60px); background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo">V-Browse</div>
        <input type="text" id="url-input" placeholder="যেকোনো ওয়েবসাইটের URL দিন (যেমন: example.com)..." autocomplete="off">
        <button onclick="loadWebsite()">Go Anonymously</button>
    </div>

    <div class="container">
        <iframe id="web-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const webFrame = document.getElementById('web-frame');

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadWebsite();
        });

        function loadWebsite() {
            let targetUrl = urlInput.value.trim();
            if (!targetUrl) return;

            // যদি প্রোটোকল না থাকে, যোগ করে নেবে
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }

            // Vercel-এর ব্যাকএন্ড এপিআই প্রক্সিতে পাঠানো হচ্ছে
            webFrame.src = `/api/proxy?url=${encodeURIComponent(targetUrl)}`;
        }
    </script>
</body>
</html>
